{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-md">
  <div class="card">
    <h2 class="text-xl font-semibold">Two-factor authentication</h2>
    <p class="mt-2 text-sm text-slate-500">
      Enter the 6-digit code from your authenticator app, or a recovery code.
    </p>
    <form method="POST" action="{{ url_for('user.two_factor_post') }}"
          class="mt-4 space-y-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label class="label" for="code">Verification code</label>
        <input class="input tracking-widest text-center text-lg"
               type="text" id="code" name="code"
               inputmode="numeric" autocomplete="one-time-code"
               placeholder="123456 or recovery code" autofocus required>
      </div>

      <button type="submit" class="btn btn-primary w-full">Verify</button>
    </form>
  </div>
</div>
{% endblock %}
