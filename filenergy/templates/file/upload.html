{% extends "base.html" %}

{% block css %}
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/jquery.fileupload-ui.css">
{% endblock %}

{% block header %}Upload Files{% endblock %}

{% block content %}

<div <div class="row well">

    <span class="btn btn-success fileinput-button">
        <i class="glyphicon glyphicon-plus"></i>
        <span>Add files...</span>
        <input id="fileupload" type="file" name="files[]" multiple>
    </span>
    <br>
    <br>

    <div id="progress" class="progress">
        <div class="bar"></div>
    </div>

    <div id="files" class="files"></div>

    <hr style="margin:20px 0;">
    <h4 style="font-size:14px;color:#666;">Or pull from a URL</h4>
    <form id="url-form" class="form-inline" onsubmit="ingestUrl(); return false;">
      <input type="url" id="url-input" placeholder="https://example.com/article" class="input-xlarge" required>
      <button class="btn btn-default" type="submit">Fetch & index</button>
      <span id="url-status" style="margin-left:10px;color:#888;font-size:13px;"></span>
    </form>
</div>

<script>
function ingestUrl() {
  var $input = $('#url-input');
  var $status = $('#url-status');
  var url = $input.val().trim();
  if (!url) return;
  $status.text('Fetching...');
  $.ajax({
    url: '/file/from_url/',
    method: 'POST',
    data: { url: url },
  }).done(function(resp) {
    $status.html('Saved as <a href="/file/' + resp.file_id + '">' + resp.name + '</a>');
    $input.val('');
  }).fail(function(xhr) {
    var msg = (xhr.responseJSON && xhr.responseJSON.error) || 'Failed.';
    $status.css('color', '#a00').text(msg);
  });
}
</script>

<script src="/static/js/vendor/jquery.ui.widget.js"></script>
<script src="/static/js/load-image.min.js"></script>
<script src="/static/js/canvas-to-blob.min.js"></script>

<script src="/static/js/jquery.iframe-transport.js"></script>
<script src="/static/js/jquery.fileupload.js"></script>
<script src="/static/js/jquery.fileupload-process.js"></script>

<script src="/static/js/jquery.fileupload-image.js"></script>
<script src="/static/js/jquery.fileupload-audio.js"></script>
<script src="/static/js/jquery.fileupload-video.js"></script>

<script src="/static/js/jquery.fileupload-validate.js"></script>
<script src="/static/js/jquery.cookie.js"></script>
<script>

$(function () {
    'use strict';

    var uploadButton = $('<button/>')
        .addClass('btn btn-primary')
        .prop('disabled', true)
        .text('Processing...')
        .on('click', function () {
            var $this = $(this),
                data = $this.data();
            $this.off('click').text('Abort')
                .on('click', function () {
                    $this.remove();
                    data.abort();
                });
            data.submit().always(function () {
                $this.remove();
            });
        });

    $('#fileupload').fileupload({
        url: '/file/upload/',
        crossDomain: false,
        dataType: 'json',
        autoUpload: false,
        maxFileSize: 10000000, // 10 MB
        disableImageResize: /Android(?!.*Chrome)|Opera/.test(window.navigator.userAgent),
        previewMaxWidth: 100,
        previewMaxHeight: 100,
        previewCrop: true
    }).on('fileuploadadd', function (e, data) {
        data.context = $('<div/>').appendTo('#files');
        $.each(data.files, function (index, file) {
            var node = $('<p/>').append($('<span/>').text(file.name));
            if (!index) {
                node.append('<br>').append(uploadButton.clone(true).data(data));
            }
            node.appendTo(data.context);
        });
    }).on('fileuploadprocessalways', function (e, data) {
        var index = data.index,
            file = data.files[index],
            node = $(data.context.children()[index]);
        if (file.preview) {
            node.prepend('<br>').prepend(file.preview);
        }
        if (file.error) {
            node.append('<br>').append(file.error);
        }
        if (index + 1 === data.files.length) {
            data.context.find('button')
                .text('Upload')
                .prop('disabled', !!data.files.error);
        }
    }).on('fileuploadprogressall', function (e, data) {
        var progress = parseInt(data.loaded / data.total * 100, 10);
        $('#progress .bar').css('width', progress + '%');
    }).on('fileuploaddone', function (e, data) {
        $.each(data.result, function (index, file) {
            var link = $('<a>').prop('href', "/file/download/?h=" + file.url);
            $(data.context.children()[index]).wrap(link);
        });
    }).on('fileuploadfail', function (e, data) {
        $.each(data.result.files, function (index, file) {
            var error = $('<span/>').text(file.error);
            $(data.context.children()[index]).append('<br>').append(error);
        });
    }).prop('disabled', !$.support.fileInput).parent().addClass($.support.fileInput ? undefined : 'disabled');
});
</script>
{% endblock %}
