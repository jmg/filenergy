{% extends "base.html" %}

{% block css %}
<style>
  .settings-shell { display: flex; gap: 24px; max-width: 1100px; margin: 20px auto; }
  .settings-side { width: 220px; flex-shrink: 0; }
  .settings-side a { display: block; padding: 8px 12px; border-radius: 4px; color: #333; text-decoration: none; margin-bottom: 4px; }
  .settings-side a:hover { background: #f0f0f0; }
  .settings-side a.active { background: #2a4d8f; color: #fff; }
  .settings-main { flex: 1; }
  .card { padding: 18px; border: 1px solid #eee; border-radius: 8px; background: #fff; margin-bottom: 16px; }
  .card h3 { margin: 0 0 12px; font-size: 18px; }
  .card .row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
  .card .row:last-child { border-bottom: 0; }
  .card .grow { flex: 1; }
  .meter { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 4px; }
  .meter > span { display: block; height: 100%; background: #4a7bd6; }
  .pill { display: inline-block; padding: 2px 9px; font-size: 11px; border-radius: 10px; background: #eef3f8; color: #2a4d8f; text-transform: uppercase; }
  .pill.free { background: #eee; color: #555; }
  .pill.pro { background: #d8e5fb; color: #2a4d8f; }
  .pill.team { background: #fef0c7; color: #7a4f00; }
  .danger { color: #a00; }
  table.simple { width: 100%; }
  table.simple td, table.simple th { padding: 6px 8px; border-bottom: 1px solid #eee; text-align: left; }
  code.token { display: inline-block; padding: 4px 8px; background: #f5f5f5; border-radius: 4px; font-size: 12px; }
</style>
{% endblock %}

{% block content %}
<div class="settings-shell">
  <aside class="settings-side">
    <a href="{{ url_for('settings.profile') }}" class="{% if request.endpoint == 'settings.profile' %}active{% endif %}">Profile</a>
    <a href="{{ url_for('settings.workspace') }}" class="{% if request.endpoint == 'settings.workspace' %}active{% endif %}">Workspace</a>
    <a href="{{ url_for('settings.keys') }}" class="{% if request.endpoint == 'settings.keys' %}active{% endif %}">API keys</a>
    <a href="{{ url_for('settings.billing_page') }}" class="{% if request.endpoint == 'settings.billing_page' %}active{% endif %}">Billing & usage</a>
  </aside>
  <main class="settings-main">
    {% block settings %}{% endblock %}
  </main>
</div>
{% endblock %}
