{% extends "settings/_layout.html" %}

{% block header %}Profile{% endblock %}

{% block settings %}
<div class="card">
  <h3>Account</h3>
  <p><strong>Email:</strong> {{ g.user.email }}</p>
  <p><strong>Username:</strong> {{ g.user.username }}</p>
</div>

<div class="card">
  <h3>Change password</h3>
  <form method="POST" action="{{ url_for('settings.update_profile') }}">
    <p><input type="password" name="current_password" placeholder="Current password" required></p>
    <p><input type="password" name="new_password" placeholder="New password" required></p>
    <p><input type="password" name="confirm_password" placeholder="Confirm new password" required></p>
    <button class="btn btn-primary" type="submit">Update password</button>
  </form>
</div>
{% endblock %}
