{% extends "settings/_layout.html" %}

{% block settings %}
<section class="card">
  <h3 class="card-title">Account</h3>
  <dl class="grid gap-2 text-sm sm:grid-cols-2">
    <div>
      <dt class="text-slate-500">Email</dt>
      <dd class="font-medium text-slate-900">{{ g.user.email }}</dd>
    </div>
    <div>
      <dt class="text-slate-500">Username</dt>
      <dd class="font-medium text-slate-900">{{ g.user.username }}</dd>
    </div>
  </dl>
</section>

<section class="card">
  <h3 class="card-title">Change password</h3>
  <form method="POST" action="{{ url_for('settings.update_profile') }}"
        class="space-y-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="label" for="current_password">Current password</label>
      <input class="input" type="password" id="current_password"
             name="current_password" required>
    </div>
    <div>
      <label class="label" for="new_password">New password</label>
      <input class="input" type="password" id="new_password"
             name="new_password" required>
    </div>
    <div>
      <label class="label" for="confirm_password">Confirm new password</label>
      <input class="input" type="password" id="confirm_password"
             name="confirm_password" required>
    </div>
    <button class="btn btn-primary" type="submit">Update password</button>
  </form>
</section>
{% endblock %}
