{% extends "settings/_layout.html" %}

{% block settings %}
<section class="card">
  <h3 class="card-title">Step 1 — Scan this QR code</h3>
  <p class="text-sm text-slate-600">
    Use any TOTP app (Authy, 1Password, Google Authenticator, etc.).
  </p>
  <div class="mt-3 inline-block rounded bg-white p-3 shadow-sm">
    {{ qr_svg|safe }}
  </div>
  <details class="mt-3 text-sm">
    <summary class="cursor-pointer text-slate-600 hover:text-slate-900">
      Can't scan? Enter the secret manually
    </summary>
    <pre class="mt-2 break-all rounded bg-slate-50 p-3 text-xs">{{ otpauth_uri }}</pre>
  </details>
</section>

<section class="card">
  <h3 class="card-title">Step 2 — Confirm with a code</h3>
  <form method="POST" action="{{ url_for('settings.totp_enable') }}"
        class="space-y-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="label" for="code">6-digit code</label>
      <input class="input tracking-widest text-center text-lg"
             type="text" id="code" name="code"
             inputmode="numeric" placeholder="123456" required>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary" type="submit">Enable 2FA</button>
      <a class="btn btn-ghost" href="{{ url_for('settings.security') }}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
